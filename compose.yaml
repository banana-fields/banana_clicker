services:
  banana-clicker:
    image: ${CLICKER_IMAGE:-banana-clicker:local}
    container_name: ${CLICKER_CONTAINER_NAME:-banana-clicker}
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: ${PORT:-3000}
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: ${MONGO_DB:-banana_clicker}
      NO_UPDATE_NOTIFIER: "1"
      NPM_CONFIG_UPDATE_NOTIFIER: "false"
    ports:
      - "${APP_PORT:-3000}:${PORT:-3000}"
    restart: unless-stopped

  mongo:
    image: ${MONGO_IMAGE:-mongo:7}
    container_name: ${MONGO_CONTAINER_NAME:-banana-clicker-mongo}
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB:-banana_clicker}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - banana-clicker-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

volumes:
  banana-clicker-mongo-data:
